<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mock Vendor · Dashboard</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --border:#2a2f3a;
    --fg:#e6e9ef; --muted:#9aa4b2; --accent:#4f8cff; --accent2:#22c55e;
    --danger:#ef4444; --warn:#f59e0b; --chip:#232834; --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:light){
    :root{ --bg:#f4f6fa; --panel:#fff; --panel2:#f0f2f7; --border:#dde1e9;
      --fg:#1a1d24; --muted:#5a6472; --chip:#eef1f6; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:20}
  header h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
  header .badge{font:11px/1 var(--mono);color:var(--muted);background:var(--chip);border:1px solid var(--border);padding:5px 8px;border-radius:6px}
  nav{display:flex;gap:4px;margin-left:8px}
  nav button{background:none;border:0;color:var(--muted);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
  nav button.active{background:var(--panel2);color:var(--fg)}
  nav button:hover{color:var(--fg)}
  .spacer{flex:1}
  main{padding:20px;max-width:1400px;margin:0 auto}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
  input,select,textarea,button{font-family:inherit;font-size:13px;color:var(--fg)}
  input,select,textarea{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  textarea{width:100%;font-family:var(--mono);font-size:12px;resize:vertical;line-height:1.45}
  .btn{background:var(--accent);border:1px solid transparent;color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:var(--panel2);color:var(--fg);border-color:var(--border)}
  .btn.danger{background:var(--danger)}
  .btn.warn{background:var(--warn);color:#3a2800}
  .btn.sm{padding:5px 9px;font-size:12px;border-radius:6px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;position:sticky;top:0;background:var(--panel)}
  tr:last-child td{border-bottom:0}
  tr:hover td{background:var(--panel2)}
  code,.mono{font-family:var(--mono);font-size:12px}
  .chip{display:inline-block;font:11px/1 var(--mono);background:var(--chip);border:1px solid var(--border);padding:3px 7px;border-radius:20px;color:var(--muted)}
  .chip.run{color:var(--accent)}
  .chip.default{color:var(--muted)}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font:11px/1.6 var(--mono);font-weight:600}
  .st2{background:rgba(34,197,94,.16);color:#22c55e}
  .st4{background:rgba(245,158,11,.16);color:#f59e0b}
  .st5{background:rgba(239,68,68,.16);color:#ef4444}
  .muted{color:var(--muted)}
  .right{text-align:right}
  .nowrap{white-space:nowrap}
  .truncate{max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row-actions{display:flex;gap:6px;justify-content:flex-end}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .toast{position:fixed;right:20px;bottom:20px;z-index:60;display:flex;flex-direction:column;gap:8px}
  .toast div{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--accent);padding:11px 15px;border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.35);max-width:420px;animation:slide .2s ease}
  .toast div.ok{border-left-color:var(--accent2)} .toast div.err{border-left-color:var(--danger)}
  @keyframes slide{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:min(760px,100%);max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal h2{margin:0;padding:16px 20px;border-bottom:1px solid var(--border);font-size:15px}
  .modal .body{padding:20px;display:flex;flex-direction:column;gap:14px}
  .modal .foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;color:var(--muted);font-weight:600}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .stat{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px}
  .stat .b{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:120px}
  .stat .b .n{font-size:22px;font-weight:700} .stat .b .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .hint{font-size:12px;color:var(--muted)}
  .scrollx{overflow-x:auto}
  a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>🎭 Mock Vendor</h1>
  <span class="badge" id="apihealth">…</span>
  <nav>
    <button data-tab="bundles" class="active">Bundles</button>
    <button data-tab="scenarios">Scenarios</button>
    <button data-tab="calls">Call Log</button>
    <button data-tab="testcases">Test Cases</button>
    <button data-tab="tests">Runs</button>
  </nav>
  <div class="spacer"></div>
  <button class="btn ghost sm" onclick="refresh()">↻ Refresh</button>
</header>

<main>
  <!-- BUNDLES -->
  <section data-panel="bundles">
    <div class="toolbar">
      <button class="btn" onclick="openBundleEditor()">+ Register bundle</button>
      <input id="bundleFilter" placeholder="filter bundles…" oninput="renderBundles()" style="min-width:220px">
      <span class="spacer"></span>
      <span class="hint" id="bundleCount"></span>
    </div>
    <div class="card"><div class="scrollx"><table id="bundleTable"></table></div><div id="bundlePager"></div></div>
  </section>

  <!-- SCENARIOS -->
  <section data-panel="scenarios" hidden>
    <div class="stat" id="scenarioStats"></div>
    <div class="toolbar">
      <button class="btn" onclick="openScenarioEditor()">+ New scenario</button>
      <select id="scnRunFilter" onchange="loadScenarios()"><option value="__all">All namespaces</option></select>
      <span class="spacer"></span>
      <button class="btn ghost sm" onclick="resetScenarios('')">Clear default set</button>
      <button class="btn warn sm" onclick="resetScenariosHost()">Clear host set…</button>
      <button class="btn danger sm" onclick="resetScenarios(null,true)">Wipe ALL</button>
    </div>
    <div class="card scrollx"><table id="scnTable"></table></div>
  </section>

  <!-- CALL LOG -->
  <section data-panel="calls" hidden>
    <div class="toolbar">
      <input id="clPath" placeholder="path filter (exact)" style="min-width:220px">
      <input id="clIp" placeholder="caller ip" style="width:150px">
      <input id="clRun" placeholder="run_id / host" style="width:150px">
      <select id="clLimit"><option>100</option><option selected>200</option><option>500</option><option>1000</option></select>
      <button class="btn sm" onclick="applyCallFilters()">Apply</button>
      <label class="hint" style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="clAuto" style="width:auto" onchange="toggleAuto()"> auto-refresh 3s</label>
      <span class="spacer"></span>
      <span class="hint" id="callCount"></span>
    </div>
    <div class="grid2" style="align-items:start">
      <div class="card"><div class="scrollx"><table id="callTable"></table></div><div id="callPager"></div></div>
      <div class="card scrollx"><table id="countTable"></table></div>
    </div>
  </section>

  <!-- TEST CASES (visual editor) -->
  <section data-panel="testcases" hidden>
    <div class="toolbar">
      <button class="btn" onclick="openCaseEditor()">+ New case</button>
      <select id="tcSuite" onchange="selectCaseSuite()" style="min-width:200px"><option value="__all">All suites</option></select>
      <button class="btn ghost sm" onclick="importCsv()">⇩ Import CSV suite</button>
      <button class="btn sm" onclick="runSuite()" id="tcRunSuiteBtn">▶ Run this suite</button>
      <span class="spacer"></span>
      <span class="hint" id="tcCount"></span>
    </div>
    <div class="card"><div class="scrollx"><table id="caseTable"></table></div><div id="casePager"></div></div>
  </section>

  <!-- TESTS (runs) -->
  <section data-panel="tests" hidden>
    <div class="card" style="padding:14px;margin-bottom:14px">
      <div class="toolbar" style="margin:0">
        <select id="tCsv" style="min-width:240px"></select>
        <input id="tTag" placeholder="tag filter (optional)" style="width:170px">
        <input id="tCases" placeholder="case ids (optional, comma-sep)" style="min-width:220px">
        <input id="tMockBase" value="http://127.0.0.1" title="mock base URL the runner hits" style="width:180px">
        <button class="btn" id="tRunBtn" onclick="runTest()">▶ Run suite</button>
        <span class="hint" id="tHint"></span>
      </div>
    </div>
    <div class="grid2" style="align-items:start;grid-template-columns:1fr 1.3fr">
      <div class="card"><div class="scrollx"><table id="runTable"></table></div><div id="runPager"></div></div>
      <div class="card" id="runDetail" style="padding:0"><div class="empty">Select a run to see per-case results.</div></div>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<!-- generic modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div class="body" id="modalBody"></div>
    <div class="foot" id="modalFoot"></div>
  </div>
</div>

<script>
const API = "/mock/admin";
let AUTO = null;

// ---- tiny helpers ----------------------------------------------------------
async function api(path, opts={}){
  const r = await fetch(API+path, {headers:{"Content-Type":"application/json"}, ...opts});
  const txt = await r.text();
  let data; try{ data = txt ? JSON.parse(txt) : null; }catch{ data = txt; }
  if(!r.ok){ const e = new Error((data&&data.error)||("HTTP "+r.status)); e.status=r.status; e.data=data; throw e; }
  return data;
}
const el = (tag,attrs={},kids=[])=>{const n=document.createElement(tag);
  for(const k in attrs){ if(k==="html")n.innerHTML=attrs[k]; else if(k.startsWith("on"))n.addEventListener(k.slice(2),attrs[k]); else n.setAttribute(k,attrs[k]); }
  for(const c of [].concat(kids)) n.append(c.nodeType?c:document.createTextNode(c)); return n;};
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(msg, kind=""){ const t=el("div",{class:kind}); t.textContent=msg; document.getElementById("toast").append(t);
  setTimeout(()=>{t.style.opacity=0;setTimeout(()=>t.remove(),200);},3200); }
function runChip(rid){ return `<span class="chip ${rid?'run':'default'}">${rid?esc(rid):'default'}</span>`; }
function statusPill(s){ const c = s>=500?'st5':s>=400?'st4':'st2'; return `<span class="pill ${c}">${s}</span>`; }

// ---- shared offset/limit pager (calls/bundles/runs/cases all use this) ----
// Every list endpoint returns {count, offset, limit, has_more, ...items}; this
// renders a "showing X–Y of Z  [Prev] [Next]" footer and re-invokes `onPage`
// with the new offset. Pages are 0-indexed by offset, not by page number, so
// it stays correct even if rows are added/removed between loads.
function renderPager(container, env, pageLen, onPage){
  container.innerHTML="";
  if(env.count===0) return;
  const from=env.offset+1, to=env.offset+pageLen;
  const bar=el("div",{style:"display:flex;align-items:center;gap:10px;padding:10px 12px"});
  bar.append(el("span",{class:"hint"},`showing ${from}–${to} of ${env.count}`));
  bar.append(el("span",{class:"spacer"}));
  const prev=el("button",{class:"btn ghost sm"},"← Prev");
  const next=el("button",{class:"btn ghost sm"},"Next →");
  prev.disabled = env.offset<=0;
  next.disabled = !env.has_more;
  prev.onclick=()=>onPage(Math.max(0, env.offset-env.limit));
  next.onclick=()=>onPage(env.offset+env.limit);
  bar.append(prev,next);
  container.append(bar);
}

// ---- tab switching ---------------------------------------------------------
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("active",x===b));
  const tab=b.dataset.tab;
  document.querySelectorAll("section[data-panel]").forEach(s=>s.hidden = s.dataset.panel!==tab);
  refresh();
});
function currentTab(){ return document.querySelector("nav button.active").dataset.tab; }
function refresh(){ const t=currentTab();
  if(t==="bundles") loadBundles();
  else if(t==="scenarios") loadScenarios();
  else if(t==="calls") loadCalls();
  else if(t==="testcases") loadCases();
  else if(t==="tests") loadTests();
}

// ---- modal -----------------------------------------------------------------
function closeModal(){ document.getElementById("modal").classList.remove("open"); }
function openModal(title, bodyNodes, footNodes){
  document.getElementById("modalTitle").textContent=title;
  const b=document.getElementById("modalBody"); b.innerHTML=""; [].concat(bodyNodes).forEach(n=>b.append(n));
  const f=document.getElementById("modalFoot"); f.innerHTML=""; [].concat(footNodes).forEach(n=>f.append(n));
  document.getElementById("modal").classList.add("open");
}
document.getElementById("modal").addEventListener("click",e=>{ if(e.target.id==="modal") closeModal(); });

// ============================ BUNDLES =======================================
// Server-paginated (newest-modified first); the filter box narrows within the
// currently loaded page only — the count label makes that explicit.
let BUNDLES=[], BUNDLE_ENV={count:0,offset:0,limit:100,has_more:false};
async function loadBundles(offset){
  offset = offset ?? BUNDLE_ENV.offset ?? 0;
  try{ const d=await api(`/register?limit=100&offset=${offset}`); BUNDLES=d.bundles||[]; BUNDLE_ENV=d; renderBundles(); }
  catch(e){ toast("bundles: "+e.message,"err"); }
}
function renderBundles(){
  const q=(document.getElementById("bundleFilter").value||"").toLowerCase();
  const rows=BUNDLES.filter(b=>b.id.toLowerCase().includes(q));
  document.getElementById("bundleCount").textContent = q
    ? `${rows.length} matching on this page (${BUNDLES.length} loaded of ${BUNDLE_ENV.count} total)`
    : `${BUNDLE_ENV.count} bundle(s)`;
  const t=document.getElementById("bundleTable"); t.innerHTML="";
  t.append(el("tr",{},[el("th",{},"Bundle id"),el("th",{},"Scenarios"),el("th",{},"Namespace"),el("th",{},"Modified"),el("th",{class:"right"},"Actions")]));
  if(!rows.length){ t.append(el("tr",{},el("td",{colspan:5},el("div",{class:"empty"},"No bundles registered. Use the register scripts or “+ Register bundle”.")))); }
  for(const b of rows){
    const acts=el("div",{class:"row-actions"},[
      el("button",{class:"btn sm",onclick:()=>implementBundle(b.id)},"Implement"),
      el("button",{class:"btn ghost sm",onclick:()=>viewBundle(b.id)},"View / Edit"),
      el("button",{class:"btn danger sm",onclick:()=>delBundle(b.id)},"✕"),
    ]);
    t.append(el("tr",{},[
      el("td",{class:"mono"},b.id),
      el("td",{},String(b.scenarios)),
      el("td",{html:runChip(b.run_id)}),
      el("td",{class:"muted nowrap"},(b.modified_at||"").replace("T"," ").slice(0,19)),
      el("td",{},acts),
    ]));
  }
  renderPager(document.getElementById("bundlePager"), BUNDLE_ENV, BUNDLES.length, (off)=>loadBundles(off));
}
async function implementBundle(id){
  const host=prompt(`Implement "${id}" into which namespace?\n\n· leave blank = default set (served to any caller with no per-host set)\n· enter a caller IP / run_id = isolated set for that host (parallel-safe)`,"");
  if(host===null) return;
  try{ const r=await api("/implement",{method:"POST",body:JSON.stringify({id,run_id:host.trim()})});
    toast(`implemented ${id} → ${host.trim()||"default"} (${r.scenarios_seeded} scenarios)`,"ok");
    if(currentTab()==="scenarios") loadScenarios();
  }catch(e){ toast("implement: "+e.message,"err"); }
}
async function delBundle(id){ if(!confirm(`Delete bundle "${id}"? (does not touch seeded scenarios)`))return;
  try{ await api("/register/"+encodeURIComponent(id),{method:"DELETE"}); toast("deleted "+id,"ok"); loadBundles(); }
  catch(e){ toast("delete: "+e.message,"err"); } }
async function viewBundle(id){
  let def;
  try{ def=(await api("/register/"+encodeURIComponent(id))).scenarios; }
  catch(e){ toast("load: "+e.message,"err"); return; }
  const ta=el("textarea",{rows:20}); ta.value=JSON.stringify(def,null,2);
  openModal(`Bundle · ${id}`,
    el("div",{class:"field"},[el("label",{},"scenarios[] definition (edit + Save re-registers)"),ta]),
    [ el("button",{class:"btn ghost",onclick:closeModal},"Close"),
      el("button",{class:"btn",onclick:async()=>{ let scn; try{scn=JSON.parse(ta.value);}catch(err){return toast("invalid JSON: "+err.message,"err");}
        try{ await api("/register",{method:"POST",body:JSON.stringify({id,scenarios:scn})}); toast("re-registered "+id,"ok"); closeModal(); loadBundles(); }
        catch(e){ toast("save: "+e.message,"err"); } }},"Save & re-register") ]);
}
function openBundleEditor(){
  const idIn=el("input",{placeholder:"bundle id, e.g. my-case"});
  const ta=el("textarea",{rows:16}); ta.value=JSON.stringify([{method:"POST",path:"/vendor/idology/verify",default_format:"xml",scenario:"idology-pass",priority:5,is_sequence:false,match_key:"",match_value:"",responses:[{status:200,format:"xml",raw:"<?xml version=\"1.0\"?><response><summary-result><key>id.success</key></summary-result></response>",delay_ms:0}]}],null,2);
  openModal("Register new bundle",
    [el("div",{class:"field"},[el("label",{},"bundle id"),idIn]),
     el("div",{class:"field"},[el("label",{},"scenarios[] (seed_scenario_dict payloads)"),ta])],
    [ el("button",{class:"btn ghost",onclick:closeModal},"Cancel"),
      el("button",{class:"btn",onclick:async()=>{ const id=idIn.value.trim(); if(!id)return toast("id required","err");
        let scn; try{scn=JSON.parse(ta.value);}catch(err){return toast("invalid JSON: "+err.message,"err");}
        try{ await api("/register",{method:"POST",body:JSON.stringify({id,scenarios:scn})}); toast("registered "+id,"ok"); closeModal(); loadBundles(); }
        catch(e){ toast("register: "+e.message,"err"); } }},"Register") ]);
}

// ============================ SCENARIOS =====================================
let SCENARIOS=[];
async function loadScenarios(){
  const sel=document.getElementById("scnRunFilter").value;
  const qs = sel==="__all" ? "" : "?run_id="+encodeURIComponent(sel==="__default"?"":sel);
  try{ SCENARIOS=(await api("/scenarios"+qs)).scenarios||[]; renderScenarios(); }
  catch(e){ toast("scenarios: "+e.message,"err"); }
}
function renderScenarios(){
  // namespace filter options (derive from current data + keep selection)
  const ns=[...new Set(SCENARIOS.map(s=>s.run_id))];
  const sel=document.getElementById("scnRunFilter"); const cur=sel.value;
  sel.innerHTML=`<option value="__all">All namespaces</option><option value="__default">default (host: none)</option>`+
    ns.filter(Boolean).sort().map(r=>`<option value="${esc(r)}">host: ${esc(r)}</option>`).join("");
  if([...sel.options].some(o=>o.value===cur)) sel.value=cur;

  // stats
  const byNs={}; SCENARIOS.forEach(s=>byNs[s.run_id||""]=(byNs[s.run_id||""]||0)+1);
  const stat=document.getElementById("scenarioStats"); stat.innerHTML="";
  stat.append(bstat(SCENARIOS.length,"active scenarios"));
  stat.append(bstat(Object.keys(byNs).length,"namespaces"));
  stat.append(bstat(byNs[""]||0,"default set"));
  const hosts=Object.keys(byNs).filter(Boolean); if(hosts.length) stat.append(bstat(hosts.length,"per-host sets"));

  const t=document.getElementById("scnTable"); t.innerHTML="";
  t.append(el("tr",{},[el("th",{},"id"),el("th",{},"Endpoint"),el("th",{},"Scenario"),el("th",{},"Match"),
    el("th",{},"Namespace"),el("th",{class:"right"},"Prio"),el("th",{},"Seq"),el("th",{},"On"),el("th",{},"Resp"),el("th",{class:"right"},"Actions")]));
  if(!SCENARIOS.length){ t.append(el("tr",{},el("td",{colspan:10},el("div",{class:"empty"},"No active scenarios in this namespace. Implement a bundle or add one.")))); return; }
  for(const s of SCENARIOS.sort((a,b)=>(a.endpoint+a.name)<(b.endpoint+b.name)?-1:1)){
    const tog=el("input",{type:"checkbox"}); tog.checked=s.enabled; tog.onchange=()=>putScn(s.id,{enabled:tog.checked});
    const acts=el("div",{class:"row-actions"},[
      el("button",{class:"btn ghost sm",onclick:()=>openScenarioEditor(s)},"Edit"),
      el("button",{class:"btn danger sm",onclick:()=>delScn(s)},"✕"),
    ]);
    t.append(el("tr",{},[
      el("td",{class:"muted"},String(s.id)),
      el("td",{class:"mono"},s.endpoint),
      el("td",{},s.name),
      el("td",{class:"mono muted"},s.match_key?`${s.match_key}=${s.match_value}`:"—"),
      el("td",{html:runChip(s.run_id)}),
      el("td",{class:"right"},String(s.priority)),
      el("td",{},s.is_sequence?"↻ "+s.responses.length:"—"),
      el("td",{},tog),
      el("td",{class:"muted"},String((s.responses||[]).length)),
      el("td",{},acts),
    ]));
  }
}
function bstat(n,l){ return el("div",{class:"b"},[el("div",{class:"n"},String(n)),el("div",{class:"l"},l)]); }
async function putScn(id,patch){ try{ await api("/scenarios/"+id,{method:"PUT",body:JSON.stringify(patch)}); toast("updated #"+id,"ok"); }
  catch(e){ toast("update: "+e.message,"err"); loadScenarios(); } }
async function delScn(s){ if(!confirm(`Delete scenario "${s.name}" (${s.endpoint})?`))return;

// ---- curl paste --> {method,url,headers,body} ----
// Lets you paste a `curl` command to fill a call instead of hand-typing method,
// url, headers (incl. auth tokens) and body. Best-effort parser: handles quotes,
// line continuations, -X/-H/-d and friends; unknown flags are skipped, not fatal.
function tokenizeCurl(s){
  const t=[]; let cur="", q=null, has=false;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(q){
      if(c==="\\"&&q==='"'&&i+1<s.length){ cur+=s[++i]; continue; }
      if(c===q){ q=null; continue; }
      cur+=c; continue;
    }
    if(c==='"'||c==="'"){ q=c; has=true; continue; }
    if(c==="\\"&&(s[i+1]==="\n"||s[i+1]==="\r")){ i++; continue; }
    if(/\s/.test(c)){ if(cur||has){t.push(cur);cur="";has=false;} continue; }
    cur+=c;
  }
  if(cur||has) t.push(cur);
  return t;
}
function parseCurl(raw){
  const toks=tokenizeCurl((raw||"").trim());
  let method="", url="", body=null; const headers={};
  const dataFlags=new Set(["-d","--data","--data-raw","--data-binary","--data-ascii","--data-urlencode"]);
  for(let i=0;i<toks.length;i++){
    let a=toks[i];
    if(a==="curl") continue;
    if(a==="-X"||a==="--request"){ method=toks[++i]||method; continue; }
    if(a.startsWith("-X")&&a.length>2){ method=a.slice(2); continue; }
    if(a==="-H"||a==="--header"){ const h=toks[++i]||""; const idx=h.indexOf(":"); if(idx>0)headers[h.slice(0,idx).trim()]=h.slice(idx+1).trim(); continue; }
    if(a==="-A"||a==="--user-agent"){ headers["User-Agent"]=toks[++i]||""; continue; }
    if(a==="-b"||a==="--cookie"){ headers["Cookie"]=toks[++i]||""; continue; }
    if(a==="-e"||a==="--referer"){ headers["Referer"]=toks[++i]||""; continue; }
    if(a==="--url"){ url=toks[++i]||url; continue; }
    if(dataFlags.has(a)){ const v=toks[++i]||""; body=body==null?v:body+"&"+v; continue; }
    if(a.startsWith("-d")&&a.length>2){ const v=a.slice(2); body=body==null?v:body+"&"+v; continue; }
    if(a.startsWith("-")) continue;          // unknown flag / bare option — skip
    if(!url) url=a;                            // first bare token is the URL
  }
  if(!method) method = body!=null ? "POST" : "GET";
  let bodyOut=body;
  if(typeof body==="string"){ try{ bodyOut=JSON.parse(body); }catch{} }
  return {method:method.toUpperCase(), url, headers, body: body==null?undefined:bodyOut};
}
// Reveal-on-click textarea + apply button; onApply({method,url,headers,body}).
function curlBox(onApply){
  const wrap=el("div",{style:"margin:2px 0 10px"});
  const ta=el("textarea",{rows:4,placeholder:"paste a curl command…  e.g. curl -X POST https://… -H 'Authorization: Bearer …' -d '{\"k\":1}'",style:"display:none"});

    onApply(p); ta.style.display="none"; apply.style.display="none"; ta.value=""; toast("filled from curl — edit as needed","ok"); };

      const sync=()=>{ s.method=method.value;s.path=path.value;s.scenario=scn.value;s.match_key=mk_.value;s.match_value=mv.value;s.priority=Number(pr.value)||0;s.is_sequence=seq.checked;s.run_id=ns.value.trim();
        try{s.responses=JSON.parse(resp.value);}catch{} };
      [method,path,scn,mk_,mv,pr,ns].forEach(n=>n.addEventListener("change",sync)); seq.addEventListener("change",sync); resp.addEventListener("change",sync);
      card.append(el("div",{class:"grid3"},[mk("method",method),mk("path",path,"vendor URL the mock intercepts"),mk("scenario name",scn,"any label — identifies this canned response")]));
      card.append(el("div",{class:"grid3"},[mk("match_key",mk_,"optional: only use this seed when the request body matches"),mk("match_value",mv),mk("priority",pr,"higher wins if several seeds could match")]));
      card.append(mk("expect from IP / host (namespace)",ns,'blank = seed the default set, served to any caller. Set a caller IP (or run_id) to isolate this seed to that host only — useful for parallel runs; see the Scenarios tab namespace filter.'));
      card.append(el("label",{class:"hint",style:"display:flex;gap:6px;align-items:center;margin:8px 0"},[seq," is_sequence — serve responses[] in order, one per call (Nth-call behaviour), instead of always the first"]));
      card.append(mk("responses[] (JSON array)",resp,'each item: {"status":200,"format":"json"|"xml","delay_ms":0, and either "raw":"<...>" or "canonical":{...}}'));
      card.append(el("div",{style:"text-align:right;margin-top:6px"},del));
      seedWrap.append(card);
    });
    seedWrap.append(el("button",{class:"btn ghost sm",onclick:()=>{d.seeds=d.seeds||[];d.seeds.push({method:"POST",path:"",scenario:"",priority:5,match_key:"",match_value:"",run_id:"",is_sequence:false,responses:[{status:200,format:"json",canonical:{}}]});drawSeeds();}},"+ add another seed"));
  }
  drawSeeds();

  // call(s)
  body.append(el("h3",{style:"margin:16px 0 6px;font-size:13px"},"Calls — the requests this test sends to the AUT, in order"));
  body.append(el("div",{class:"hint",style:"margin-bottom:8px"},"Call 1 kicks off the flow. Add more calls for a multi-step flow (e.g. start → status_details → resume) — each runs after the previous one, in order."));

  const c1card=el("div",{class:"card",style:"padding:12px;margin-bottom:10px;background:var(--panel2)"});
  c1card.append(el("div",{style:"font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px"},"Call 1 · initial (required)"));
  const cm=el("select",{style:"width:90px"},["POST","GET","PUT","DELETE","PATCH"].map(m=>el("option",{...(m===((d.call||{}).method||"POST")?{selected:""}:{})},m))),
        curl=el("input",{value:(d.call||{}).url||"",placeholder:"http://<aut-host>/api/v1/kyc/start"}),
        ces=el("input",{type:"number",value:(d.call||{}).expect_status??200,style:"width:90px"}),
        chd=ta((d.call||{}).headers||{},3), cbody=ta((d.call||{}).body||{},6);
  c1card.append(curlBox(p=>{ cm.value=p.method; curl.value=p.url;
    if(Object.keys(p.headers).length) chd.value=JSON.stringify(p.headers,null,2);
    if(p.body!==undefined) cbody.value=typeof p.body==="string"?p.body:JSON.stringify(p.body,null,2); }));
  c1card.append(el("div",{class:"grid3"},[mk("method",cm),mk("url",curl,"the AUT endpoint this test drives"),mk("expect_status",ces,"HTTP status this call must return")]));
  c1card.append(el("div",{class:"grid2"},[mk("headers (JSON — add Authorization / tokens here)",chd),mk("body (JSON — dotted keys nest automatically, e.g. \"data.flow_id\")",cbody)]));
  body.append(c1card);

  const stepWrap=el("div",{}); body.append(stepWrap);
  function drawSteps(){
    stepWrap.innerHTML="";
    (d.call_steps||[]).forEach((s,i)=>{
      const card=el("div",{class:"card",style:"padding:12px;margin-bottom:10px;background:var(--panel2)"});
      card.append(el("div",{style:"font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px"},`Call ${i+2} · follow-up`));
      const m=el("select",{style:"width:90px"},["POST","GET","PUT","DELETE","PATCH"].map(mm=>el("option",{...(mm===(s.method||"POST")?{selected:""}:{})},mm))),
        u=el("input",{value:s.url||"",placeholder:"http://<aut-host>/api/v1/kyc/resume"}),
        es=el("input",{type:"number",value:s.expect_status??"",placeholder:"(any)",style:"width:90px"}),
        dl=el("input",{type:"number",value:s.delay_ms??0,style:"width:110px"}),
        hd=ta(s.headers||{},2), bd=ta(s.body||{},4);
      const del=el("button",{class:"btn danger sm",onclick:()=>{d.call_steps.splice(i,1);drawSteps();}},"✕ remove this call");
      const sync=()=>{ s.method=m.value;s.url=u.value;s.expect_status=es.value?Number(es.value):null;s.delay_ms=Number(dl.value)||0;
        try{s.headers=JSON.parse(hd.value);}catch{} try{s.body=JSON.parse(bd.value);}catch{} };
      [m,u,es,dl].forEach(n=>n.addEventListener("change",sync)); hd.addEventListener("change",sync); bd.addEventListener("change",sync);
      card.append(curlBox(p=>{ m.value=p.method; u.value=p.url;
        if(Object.keys(p.headers).length) hd.value=JSON.stringify(p.headers,null,2);
        if(p.body!==undefined) bd.value=typeof p.body==="string"?p.body:JSON.stringify(p.body,null,2); sync(); }));
      card.append(el("div",{class:"grid3"},[mk("method",m),mk("url",u),mk("expect_status",es,"leave blank to not check")]));
      card.append(mk("delay before this call (ms)",dl,"wait time after the previous call, e.g. letting an async provider settle"));
      card.append(el("div",{class:"grid2"},[mk("headers (JSON — add Authorization / tokens here)",hd),mk("body (JSON, dotted keys ok)",bd)]));
      card.append(el("div",{style:"text-align:right;margin-top:6px"},del));
      stepWrap.append(card);
    });
    stepWrap.append(el("button",{class:"btn ghost sm",onclick:()=>{d.call_steps=d.call_steps||[];d.call_steps.push({method:"POST",url:"",headers:{},body:{},expect_status:null,delay_ms:0});drawSteps();}},"+ add another call"));
  }
  drawSteps();

  // expectations
  body.append(el("h3",{style:"margin:16px 0 6px;font-size:13px"},"Expectations — how the result is verified"));
  const rs=el("input",{type:"number",value:(d.resp||{}).status??200,style:"width:90px"}),
        rb=ta((d.resp||{}).body||{},4), calls=ta(d.calls||{},4);
  body.append(el("div",{class:"grid2"},[mk("resp.status",rs),mk("resp.body expects (JSON: key→value|not_null|/regex/)",rb)]));
  body.append(mk("call counts (JSON: path→N or \">=N\")",calls));
  const dbh=el("input",{value:(d.db||{}).host||""}), dbn=el("input",{value:(d.db||{}).database||""}),
        dbd=el("input",{type:"number",value:(d.db||{}).delay_ms??0,style:"width:110px"}), dbc=ta(d.db_checks||[],5);
  body.append(el("div",{class:"grid3"},[mk("db.host",dbh),mk("db.database",dbn),mk("db.delay_ms",dbd)]));
  body.append(mk("db_checks[] (JSON: {table,where,expect})",dbc));

  const valMsg=el("div",{class:"hint"});
  function collect(){
    const parse=(t,fb)=>{try{return JSON.parse(t.value);}catch{return fb;}};
    // sync seed cards already updated d.seeds via their listeners
    return {
      case_id:cid.value.trim(), flow_id:flow.value.trim(), id_key:idkey.value.trim(),
      tags:tags.value.split(",").map(x=>x.trim()).filter(Boolean), notes:notes.value,
      seeds:d.seeds||[],
      call:{method:cm.value,url:curl.value.trim(),headers:parse(chd,{}),body:parse(cbody,{}),expect_status:ces.value?Number(ces.value):null},
      call_steps:d.call_steps||[], repeat:d.repeat||{same_flow_id:1,distinct_ids:1,concurrent:1},
      resp:{status:rs.value?Number(rs.value):null,body:parse(rb,{})}, calls:parse(calls,{}),
      db:{host:dbh.value.trim(),database:dbn.value.trim(),delay_ms:Number(dbd.value)||0}, db_checks:parse(dbc,[]),
      kafka:d.kafka||{bootstrap:""}, kafka_checks:d.kafka_checks||[],
    };
  }
  const foot=[
    el("button",{class:"btn ghost",onclick:closeModal},"Cancel"),
    el("button",{class:"btn ghost",onclick:async()=>{ const def=collect();
      try{ const v=await api("/testcases/validate",{method:"POST",body:JSON.stringify({definition:def})});
        valMsg.textContent=v.ok?"✓ valid":("✗ "+v.errors.join("; ")); valMsg.style.color=v.ok?"var(--accent2)":"var(--danger)"; }
      catch(e){ toast(e.message,"err"); } }},"Validate"),
    el("button",{class:"btn",onclick:async()=>{ const def=collect();
      if(!def.case_id) return toast("case_id required","err");
      const payload={case_id:def.case_id,suite:suite.value.trim(),definition:def,enabled:true};
      try{ if(EDIT_ID){ await api("/testcases/"+EDIT_ID,{method:"PUT",body:JSON.stringify(payload)}); }
           else{ await api("/testcases",{method:"POST",body:JSON.stringify(payload)}); }
        toast("saved "+def.case_id,"ok"); closeModal(); loadCases(); }
      catch(e){ toast("save: "+e.message,"err"); } }},EDIT_ID?"Save":"Create"),
  ];
  openModal(EDIT_ID?`Edit case`:"New test case",[body,valMsg],foot);
  document.querySelector(".modal").style.width="min(900px,100%)";
}

// ============================ TESTS =========================================
let TEST_POLL=null, OPEN_RUN=null;
// The run selector lists BOTH editable DB suites and on-disk CSV files. Each
// option's value is prefixed with its source ("db:<suite>" / "csv:<file>") so
// runTest() can send the right payload. Rebuilt every load so suites added in
// the Test Cases tab show up here immediately.
async function loadTests(){
  try{
    const [cd, td] = await Promise.all([api("/test-csvs"), api("/testcases")]);
    const sel=document.getElementById("tCsv");
    const suites=(td.suites||[]).filter(Boolean);
    const csvs=cd.csvs||[];
    let html="";
    if(suites.length) html+=`<optgroup label="DB suites (editable cases)">`+
      suites.map(s=>`<option value="db:${esc(s)}">${esc(s)}</option>`).join("")+`</optgroup>`;
    if(csvs.length) html+=`<optgroup label="CSV files (data/)">`+
      csvs.map(c=>`<option value="csv:${esc(c.name)}">${esc(c.name)}${c.cases!=null?` (${c.cases} cases)`:""}</option>`).join("")+`</optgroup>`;
    sel.innerHTML=html || `<option value="">— no DB suites or CSV files yet —</option>`;
  }catch(e){ toast("suites/csvs: "+e.message,"err"); }
  loadRuns();
}
let RUN_OFFSET=0;
async function loadRuns(offset){
  if(offset!==undefined) RUN_OFFSET=offset;
  try{ const d=await api(`/testruns?limit=50&offset=${RUN_OFFSET}`); renderRuns(d);
    const active=(d.runs||[]).some(r=>r.status==="running"||r.status==="pending");
    document.getElementById("tRunBtn").disabled=active;
    document.getElementById("tHint").textContent=active?"a run is active — new runs are queued out (serialized)":"";
    if(active && !TEST_POLL) TEST_POLL=setInterval(()=>{ loadRuns(); if(OPEN_RUN) viewRun(OPEN_RUN,true); },2500);
    if(!active && TEST_POLL){ clearInterval(TEST_POLL); TEST_POLL=null; }
  }catch(e){ toast("runs: "+e.message,"err"); }
}
function runStatusPill(s){ const m={passed:"st2",failed:"st5",error:"st5",running:"st4",pending:"st4",cancelled:"st4"};
  return `<span class="pill ${m[s]||'st4'}">${s}</span>`; }
function renderRuns(d){
  const runs=d.runs||[];
  const t=document.getElementById("runTable"); t.innerHTML="";
  t.append(el("tr",{},[el("th",{},"#"),el("th",{},"Suite"),el("th",{},"Status"),el("th",{class:"right"},"Pass/Total"),el("th",{},"When"),el("th",{class:"right"},"")]));
  if(!runs.length){ t.append(el("tr",{},el("td",{colspan:6},el("div",{class:"empty"},"No runs yet. Pick a suite and hit Run.")))); }
  for(const r of runs){
    const acts=el("div",{class:"row-actions"},[
      el("button",{class:"btn ghost sm",onclick:()=>viewRun(r.id)},"View"),
      el("button",{class:"btn danger sm",onclick:()=>delRun(r.id)},"✕"),
    ]);
    const prog = r.total? `${r.passed}/${r.total}${r.failed?` · ${r.failed}✗`:""}` : (r.status==="running"?"…":"—");
    t.append(el("tr",{},[
      el("td",{class:"muted"},String(r.id)),
      el("td",{class:"mono truncate",title:r.csv},r.csv.replace("data/","")),
      el("td",{html:runStatusPill(r.status)}),
      el("td",{class:"right mono"},prog),
      el("td",{class:"muted nowrap"},(r.created_at||"").replace("T"," ").slice(5,19)),
      el("td",{},acts),
    ]));
  }
  renderPager(document.getElementById("runPager"), d, runs.length, (off)=>loadRuns(off));
}
async function runTest(){
  const raw=document.getElementById("tCsv").value;
  if(!raw) return toast("pick a suite or CSV","err");
  const i=raw.indexOf(":"), source=raw.slice(0,i), name=raw.slice(i+1);
  const common={tag:document.getElementById("tTag").value.trim(),
    cases:document.getElementById("tCases").value.trim(), mock_base:document.getElementById("tMockBase").value.trim()};
  const body = source==="db" ? {source:"db", suite:name, ...common} : {csv:name, ...common};
  try{ const r=await api("/testruns",{method:"POST",body:JSON.stringify(body)});
    toast(`started run #${r.id} (${source==="db"?"suite ":""}${name})`,"ok"); OPEN_RUN=r.id; loadRuns(); viewRun(r.id); }
  catch(e){ toast("run: "+e.message,"err"); }
}
async function viewRun(id, quiet){
  OPEN_RUN=id;
  let r; try{ r=await api("/testruns/"+id); }catch(e){ if(!quiet)toast("view: "+e.message,"err"); return; }
  const d=document.getElementById("runDetail"); d.style.padding="0";
  const head=`<div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:center;flex-wrap:wrap">
      <b>Run #${r.id}</b> ${runStatusPill(r.status)}
      <span class="mono muted">${esc(r.csv)}</span>
      <span class="chip">${r.passed}/${r.total} pass${r.failed?` · ${r.failed} fail`:""}${r.skipped?` · ${r.skipped} skip`:""}</span>
      ${r.tag?`<span class="chip run">tag:${esc(r.tag)}</span>`:""}
      <span class="spacer"></span><span class="hint">${(r.finished_at||r.started_at||"").replace("T"," ").slice(0,19)}</span>
    </div>`;
  let rowsHtml="";
  for(const res of (r.results||[])){
    const p=res.skipped?'<span class="pill st4">SKIP</span>':res.passed?'<span class="pill st2">PASS</span>':'<span class="pill st5">FAIL</span>';
    const errs=(res.errors&&res.errors.length)?`<div class="mono" style="color:var(--danger);font-size:11px;margin-top:3px;white-space:pre-wrap">${esc(res.errors.join("\n"))}</div>`:"";
    const resps=(res.responses||[]);
    let respHtml="";
    if(resps.length){
      respHtml=resps.map(rr=>{
        const st = rr.status==null ? '<span class="pill st4">—</span>' : statusPill(rr.status);
        const body = esc(rr.body||"")+(rr.truncated?"\n… (truncated)":"");
        return `<details style="margin:4px 0">
          <summary style="cursor:pointer;list-style:none">${st}
            <span class="muted" style="font-size:11px">${esc(rr.label||"")}</span>
            <span class="mono" style="font-size:11px">${esc(rr.method||"")} ${esc(rr.url||"")}</span></summary>
          <pre class="mono" style="white-space:pre-wrap;overflow:auto;max-height:320px;margin:6px 0 0;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:11px">${body||'<span class="muted">(empty body)</span>'}</pre>
        </details>`;
      }).join("");
    }
    rowsHtml+=`<tr><td class="mono">${esc(res.case_id)}</td><td>${p}</td><td class="right muted mono">${res.duration_ms}ms</td></tr>
      ${errs?`<tr><td colspan="3" style="padding-top:0">${errs}</td></tr>`:""}
      ${respHtml?`<tr><td colspan="3" style="padding-top:0">${respHtml}</td></tr>`:""}`;
  }
  const errBox = r.error?`<div class="mono" style="padding:12px 14px;color:var(--danger);white-space:pre-wrap;font-size:11px;border-top:1px solid var(--border)">${esc(r.error)}</div>`:"";
  const table = (r.results&&r.results.length)?
    `<table><tr><th>Case</th><th>Result</th><th class="right">Time</th></tr>${rowsHtml}</table>`
    : `<div class="empty">${r.status==="running"||r.status==="pending"?"running… results stream in as cases finish":"no results"}</div>`;
  d.innerHTML=head+`<div class="scrollx">${table}</div>`+errBox;
}
async function delRun(id){ if(!confirm(`Delete run #${id} and its results?`))return;
  try{ await api("/testruns/"+id,{method:"DELETE"}); toast("deleted run #"+id,"ok");
    if(OPEN_RUN===id){ OPEN_RUN=null; document.getElementById("runDetail").innerHTML='<div class="empty">Select a run to see per-case results.</div>'; }
    loadRuns(); }
  catch(e){ toast("delete: "+e.message,"err"); } }

// ---- boot ------------------------------------------------------------------
async function health(){ try{ const f=await api("/formats"); document.getElementById("apihealth").textContent="admin API · "+(f.formats||[]).map(x=>x.name).join("/"); }
  catch(e){ document.getElementById("apihealth").textContent="admin API unreachable ("+e.message+")"; } }
health(); loadBundles();
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });
</script>
